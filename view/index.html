<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terra da Esperança – Login</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body class="login-page">
  <div class="login-bg-decor"></div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🌱</div>
      <div>
        <h1>Terra da<br>Esperança</h1>
        <p>Sistema de Gestão</p>
      </div>
    </div>

    <h2>Bem-vindo de volta</h2>
    <p class="subtitle">Faça login para acessar o sistema</p>

    <div class="login-form">
      <div class="form-group">
        <label>Login</label>
        <input type="text" placeholder="Seu nome de usuário" />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Token de Autenticação</label>
        <input type="text" placeholder="Código enviado por email" />
      </div>
      <a href="dashboard.html" class="btn btn-primary">Entrar no Sistema</a>
    </div>

    <p class="forgot-link">
      Esqueceu sua senha? <a href="recuperar-senha.html">Recuperar acesso</a>
    </p>
  </div>
</body>
</html>
