<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terra da Esperança – Recuperar Senha</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body class="login-page">
  <div class="login-bg-decor"></div>

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🌱</div>
      <div>
        <h1>Terra da<br>Esperança</h1>
        <p>Sistema de Gestão</p>
      </div>
    </div>

    <h2>Recuperar Senha</h2>
    <p class="subtitle">Informe seus dados para receber um token de redefinição</p>

    <div class="login-form">
      <div class="form-group">
        <label>Nome de Usuário (Login)</label>
        <input type="text" placeholder="Seu nome de usuário" />
      </div>
      <div class="form-group">
        <label>CPF</label>
        <input type="text" placeholder="000.000.000-00" />
      </div>
      <a href="index.html" class="btn btn-primary">Enviar Token de Verificação</a>
      <a href="index.html" class="btn btn-secondary" style="justify-content:center;">← Voltar ao login</a>
    </div>
  </div>
</body>
</html>
